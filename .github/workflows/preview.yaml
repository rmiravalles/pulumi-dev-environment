name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          command: version

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Detect environment type from PR label
        id: env_type
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"env:large"'; then
            echo "type=large" >> "$GITHUB_OUTPUT"
            echo "dockerfile=Dockerfile.large" >> "$GITHUB_OUTPUT"
          else
            echo "type=standard" >> "$GITHUB_OUTPUT"
            echo "dockerfile=Dockerfile" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY }}

      - name: Build and push container image
        id: build_image
        env:
          ACR: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
          DOCKERFILE: ${{ steps.env_type.outputs.dockerfile }}
          ENV_TYPE: ${{ steps.env_type.outputs.type }}
        run: |
          IMAGE="${ACR}.azurecr.io/preview:pr-${PR}-${ENV_TYPE}-${SHA::7}"
          docker build -f "$DOCKERFILE" -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Login to Pulumi backend (Azure Blob)
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets[format('AZURE_STORAGE_{0}', 'ACCOUNT')] }}
          AZURE_STORAGE_KEY: ${{ secrets[format('AZURE_STORAGE_{0}', 'KEY')] }}
        run: pulumi login ${{ secrets[format('PULUMI_{0}_{1}', 'BACKEND', 'URL')] }}

      - name: Create preview environment
        id: create_preview
        run: |
          python infra/create_env.py \
            ${{ github.event.pull_request.number }} \
            --image ${{ steps.build_image.outputs.image }} \
            --env-type ${{ steps.env_type.outputs.type }}

      - name: Comment preview URL
        if: ${{ success() && steps.create_preview.outputs.preview_url != '' }}
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.create_preview.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- preview-environment-url -->';
            const body = [
              marker,
              `Preview environment is ready: ${process.env.PREVIEW_URL}`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });